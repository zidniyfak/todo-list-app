<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RiserTask - Modern Minimalist To-Do List App</title>
    <meta
      name="description"
      content="Manage your daily tasks efficiently with RiserTask, a modern, minimalist, and responsive to-do list app designed with a Mobile-First approach."
    />
    <meta
      name="keywords"
      content="todo app, task manager, minimalist todo list, web application"
    />
    <meta name="author" content="Zidniy" />
    <link rel="icon" type="image/svg+xml" href="assets/brands/brand-logo.png" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <header class="greeting">
          <div class="greeting__profile">
            <img
              class="greeting__avatar"
              src="assets/img/avatar.jpg"
              alt="greeting"
            />
            <div class="greeting__info">
              <h1 class="greeting__name">Hi, Zidniy 👋</h1>
              <p class="greeting__role">Fullstack Web Developer</p>
            </div>
          </div>
          <time class="greeting__date" datetime="2026-07-19">
            <span class="greeting__date-day">Day</span>
            <span class="greeting__date-full">19 July 2026</span>
          </time>
        </header>
        <form action="" class="task-form">
          <textarea
            class="task-form__input"
            name="input-task"
            id="input-task"
            placeholder="Write your task....."
            aria-label="Write a new task"
          ></textarea>
          <div class="task-form__actions">
            <div class="task-form__options">
              <div class="task-form__priority">
                <div class="task-form__priority-trigger" aria-hidden="true">
                  <span
                    class="task-form__priority-dot task-form__priority-dot--low"
                  ></span>
                  <span class="task-form__priority-label">Low</span>
                  <svg
                    class="task-form__priority-icon"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="m6 9 6 6 6-6" />
                  </svg>
                </div>
                <select
                  class="task-form__priority-select"
                  name="task-priority"
                  id="task-priority"
                  aria-label="Task Priority"
                >
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
              <div class="task-form__date">
                <input
                  type="date"
                  class="task-form__date-input"
                  name="task-date"
                  id="task-date"
                  aria-label="Task Due Date"
                />
              </div>
            </div>
            <button type="submit" class="task-form__submit">+ Add</button>
          </div>
        </form>
        <nav class="task-nav">
          <ul class="task-nav__list">
            <li class="task-nav__item">
              <button
                class="task-nav__link task-nav__link--active"
                aria-pressed="true"
              >
                To Do
                <span class="task-nav__count task-nav__count--active">2</span>
              </button>
            </li>
            <li class="task-nav__item">
              <button class="task-nav__link" aria-pressed="false">
                Done
                <span class="task-nav__count">0</span>
              </button>
            </li>
            <li class="task-nav__item">
              <button class="task-nav__link" aria-pressed="false">
                Overdue
                <span class="task-nav__count">0</span>
              </button>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="task-list">
        <header class="task-list__header">
          <h2 class="task-list__header-title">Task List</h2>
          <button type="button" class="task-list__header-delete">
            Delete All
          </button>
        </header>
        <ul class="task-list__items"></ul>
      </main>
    </div>

    <!-- Toast Notifications Container -->
    <div class="toast-container"></div>

    <!-- Custom Confirmation Modal -->
    <div class="modal" id="confirm-modal" hidden>
      <div class="modal__backdrop"></div>
      <div class="modal__content">
        <div class="modal__header">
          <svg
            class="modal__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"
            />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
          <h4 class="modal__title">Confirm Action</h4>
        </div>
        <p class="modal__message">
          Are you sure you want to perform this action?
        </p>
        <div class="modal__actions">
          <button type="button" class="modal__btn modal__btn--cancel">
            Cancel
          </button>
          <button type="button" class="modal__btn modal__btn--confirm">
            Confirm
          </button>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
